name: Release Go Binary

on:
  push:
    tags:
      - 'v*'       # 推送 v 开头 tag 时自动触发
  workflow_dispatch:
    inputs:
      tag_name:
        description: '版本号 (例如 v1.0.1)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o domain-monitor .

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 确定版本号：手动触发用输入的 tag，tag 推送用 ref_name
          if [ -n "${{ github.event.inputs.tag_name }}" ]; then
            TAG_NAME="${{ github.event.inputs.tag_name }}"
          else
            TAG_NAME="${{ github.ref_name }}"
          fi

          echo "准备发布版本: $TAG_NAME"
          # 先删除已存在的 Release（忽略不存在时的错误），再重新创建
          gh release delete "$TAG_NAME" --yes 2>/dev/null || true
          gh release create "$TAG_NAME" domain-monitor \
            --title "Release $TAG_NAME" \
            --notes "Automated release for domain monitor" \
            --target "${{ github.sha }}"

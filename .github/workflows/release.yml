name: Release Go Binary

on:
  push:
    tags:
      - 'v*' # 当推送到类似 v1.0.0 的 tag 时触发
  workflow_dispatch: # 支持在 GitHub 页面手动点击运行

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: |
          # 关键点1：固定编译为 linux/amd64 架构，因为 GitHub Actions runner 是这个架构
          # 关键点2：CGO_ENABLED=0 确保是纯静态编译，没有外部依赖
          # 关键点3：-ldflags="-s -w" 去除调试信息，减小二进制文件体积，加快下载速度
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o domain-monitor main.go

      - name: Create Release and Upload Asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 使用内置的 gh 命令行工具，将编译好的 domain-monitor 上传到当前 tag 的 Release 中
          gh release create ${{ github.ref_name }} domain-monitor --title "Release ${{ github.ref_name }}" --notes "Automated release for domain monitor"
name: Daily Domain Monitor

on:
  schedule:
    - cron: '0 8 * * *'   # 每天北京时间 16:00 (UTC 08:00)
  workflow_dispatch:      # 手动触发

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      # 缓存 Chromium 浏览器（rod 自动下载到 ~/.cache/rod/）
      # 首次运行会下载 ~150MB，后续运行直接命中缓存，无需重复下载
      - name: Cache Chromium for rod
        id: cache-rod
        uses: actions/cache@v4
        with:
          path: ~/.cache/rod
          key: rod-browser-${{ runner.os }}-v1

      - name: Download and Run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SENDKEY: ${{ secrets.SENDKEY }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          # COOKIE 不再需要设置，程序自动通过浏览器自动化获取
        run: |
          # 1. 下载最新 Release 中的二进制文件
          echo "正在下载最新版本的 domain-monitor..."
          gh release download --repo ${{ github.repository }} --pattern "domain-monitor" --output domain-monitor --clobber

          # 2. 赋予执行权限
          chmod +x domain-monitor

          # 3. 运行程序
          echo "开始执行监控任务..."
          ./domain-monitor
